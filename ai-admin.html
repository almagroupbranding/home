<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alma AI Admin | The Alma</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-shell{padding:40px clamp(16px,4vw,58px) 80px}
    .admin-grid{display:grid;grid-template-columns:minmax(260px,.48fr) minmax(0,1fr);gap:1.2rem;align-items:start}
    .admin-panel{background:var(--paper);border:2px solid rgba(123,23,48,.35);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
    .admin-panel h1{font-size:clamp(2.2rem,5vw,4rem)}
    .admin-panel h2{font-size:2rem}
    .admin-panel label{display:block;font-weight:900;margin:.8rem 0 .35rem}
    .admin-panel textarea{min-height:160px}
    .admin-result{white-space:pre-wrap;background:#fffdf8;border:1px solid var(--line);border-radius:14px;padding:1rem;margin-top:1rem;overflow:auto}
    .draft-card{border:1px solid var(--line);border-radius:16px;padding:1rem;margin-top:1rem;background:#fffaf1}
    .hidden{display:none!important}
    .status{font-weight:900;margin-top:1rem;color:var(--burgundy)}
    .inline-actions{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:1rem}
    @media(max-width:900px){.admin-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="site-shell">
    <header class="header">
      <a class="brand" href="index.html"><img src="assets/logo/alma-building.png" alt=""><span><strong>THE ALMA</strong><small>AI Admin</small></span></a>
      <nav class="nav"><a href="index.html">View site</a><a href="https://app.pagescms.org/" target="_blank" rel="noopener">Pages CMS</a></nav>
    </header>

    <main class="admin-shell">
      <section class="admin-grid">
        <aside class="admin-panel">
          <p class="kicker">Authorised users only</p>
          <h1>AI Post Writer</h1>
          <p>Draft Alma-style updates, then publish them to GitHub only after approval.</p>

          <div id="loginBox">
            <label for="password">Admin password</label>
            <input id="password" type="password" autocomplete="current-password">
            <button class="btn primary full" id="loginBtn" type="button">Sign in</button>
            <p class="status" id="loginStatus"></p>
          </div>

          <div id="adminBox" class="hidden">
            <p class="status">Signed in.</p>
            <button class="btn secondary" id="logoutBtn" type="button">Sign out</button>
          </div>
        </aside>

        <section class="admin-panel hidden" id="writerBox">
          <p class="kicker">Create update</p>
          <h2>What do you want to post?</h2>

          <label for="postType">Type</label>
          <select id="postType">
            <option value="event">Event</option>
            <option value="news">News update</option>
          </select>

          <label for="rawPrompt">Plain English instruction</label>
          <textarea id="rawPrompt" placeholder="Example: Add karaoke next Thursday, 8pm, free entry. Make it sound warm and local."></textarea>

          <div class="inline-actions">
            <button class="btn primary" id="draftBtn" type="button">Draft with AI</button>
            <button class="btn secondary" id="clearBtn" type="button">Clear</button>
          </div>

          <div id="draftStatus" class="status"></div>
          <div id="draftArea"></div>
        </section>
      </section>
    </main>
  </div>

<script>
const API_BASE = window.ALMA_AI_API || "https://YOUR-WORKER.your-subdomain.workers.dev";
let currentDraft = null;

const $ = s => document.querySelector(s);

function setStatus(id, text){ $(id).textContent = text || ""; }

async function api(path, options = {}){
  const res = await fetch(API_BASE + path, {
    ...options,
    credentials: "include",
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {})
    }
  });
  const data = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(data.error || `Request failed: ${res.status}`);
  return data;
}

async function login(){
  setStatus("#loginStatus", "Signing in…");
  try{
    await api("/api/login", {method:"POST", body: JSON.stringify({password: $("#password").value})});
    $("#loginBox").classList.add("hidden");
    $("#adminBox").classList.remove("hidden");
    $("#writerBox").classList.remove("hidden");
    setStatus("#loginStatus", "");
  }catch(err){
    setStatus("#loginStatus", err.message);
  }
}

async function draft(){
  const raw = $("#rawPrompt").value.trim();
  if(!raw){ setStatus("#draftStatus", "Add a plain English instruction first."); return; }
  setStatus("#draftStatus", "Drafting…");
  $("#draftArea").innerHTML = "";
  try{
    const data = await api("/api/admin/draft-update", {
      method:"POST",
      body: JSON.stringify({type: $("#postType").value, prompt: raw})
    });
    currentDraft = data;
    setStatus("#draftStatus", "Draft ready. Check it carefully before publishing.");
    renderDraft(data);
  }catch(err){
    setStatus("#draftStatus", err.message);
  }
}

function escapeHtml(str){
  return String(str || "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function renderDraft(data){
  const payload = data.payload || {};
  $("#draftArea").innerHTML = `
    <div class="draft-card">
      <p class="kicker">${escapeHtml(data.type)}</p>
      <h3>${escapeHtml(payload.title)}</h3>
      <p>${escapeHtml(payload.summary)}</p>
      <p><strong>Date:</strong> ${escapeHtml(payload.date || "N/A")}<br>
      <strong>Type:</strong> ${escapeHtml(payload.type || "N/A")}<br>
      <strong>CTA:</strong> ${escapeHtml(payload.cta || "N/A")}</p>
      <h3>Social caption</h3>
      <p>${escapeHtml(data.social_caption || "")}</p>
      <h3>JSON</h3>
      <div class="admin-result">${escapeHtml(JSON.stringify(payload, null, 2))}</div>
      <div class="inline-actions">
        <button class="btn primary" id="publishBtn" type="button">Approve & publish to GitHub</button>
      </div>
    </div>`;
  $("#publishBtn").addEventListener("click", publish);
}

async function publish(){
  if(!currentDraft) return;
  setStatus("#draftStatus", "Publishing to GitHub…");
  try{
    const data = await api("/api/admin/publish-update", {
      method:"POST",
      body: JSON.stringify({type: currentDraft.type, payload: currentDraft.payload})
    });
    setStatus("#draftStatus", "Published. GitHub Pages should update shortly. Commit: " + (data.commit || "created"));
  }catch(err){
    setStatus("#draftStatus", err.message);
  }
}

async function logout(){
  await api("/api/logout", {method:"POST"}).catch(()=>{});
  location.reload();
}

$("#loginBtn").addEventListener("click", login);
$("#password").addEventListener("keydown", e => { if(e.key === "Enter") login(); });
$("#draftBtn").addEventListener("click", draft);
$("#clearBtn").addEventListener("click", () => { $("#rawPrompt").value = ""; $("#draftArea").innerHTML = ""; setStatus("#draftStatus",""); currentDraft = null; });
$("#logoutBtn").addEventListener("click", logout);
</script>
</body>
</html>
